<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button — Press If You Dare</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="particles"></canvas>

  <header class="topbar">
    <div class="brand">The Button</div>
    <div class="stats-mini">
      <span id="visitor-greeting">Welcome.</span>
      <button id="open-stats" class="pill">Stats</button>
    </div>
  </header>

  <main class="stage">
    <section class="center-card">
      <div class="glass card">

        <h1 id="gamer-tag-display">Welcome</h1>
        <p id="subtext">Press the button. See what happens.</p>

        <div class="button-wrap">
          <button id="the-button" class="giant">THE BUTTON</button>
          <div class="counter">Presses: <span id="count">0</span></div>
        </div>

        <div id="message-box">Be brave. Press the button.</div>

        <div class="controls">
          <button id="achievements-toggle" class="pill">Achievements</button>
          <button id="lore-toggle" class="pill">Lore</button>
          <button id="reset" class="pill danger">Reset</button>
        </div>

      </div>
    </section>

    <!-- LOCAL stats only (NOT global) -->
    <aside class="panel">
      <div class="glass side-card">
        <h3>Your Stats</h3>

        <ul>
          <li>Time on site: <span id="stat-time">0s</span></li>
          <li>Your Presses: <span id="stat-count">0</span></li>
          <li>Achievements: <span id="stat-achievements">0</span></li>
          <li>Lore: <span id="stat-lore">0</span></li>
          <li>Pranks: <span id="stat-pranks">0</span></li>
        </ul>

        <hr />

        <div id="achievements-panel">
          <h4>Achievements</h4>
          <ul id="achievements-list"></ul>
        </div>

        <div id="lore-panel" class="hidden">
          <h4>Lore</h4>
          <div id="lore-list"></div>
        </div>
      </div>
    </aside>

  </main>

  <div id="toast-area"></div>

  <!-- onboarding -->
  <div id="onboard" class="modal">
    <div class="modal-card glass">
      <h2>Welcome</h2>

      <input id="gamer-tag" placeholder="Gamer Tag" maxlength="32" />

      <label>
        <input id="humor-toggle" type="checkbox" />
        Enable Chaos Mode
      </label>

      <button id="accept-onboard" class="pill primary">
        Accept
      </button>
    </div>
  </div>

  <footer>
    <div id="version-display">v0.1.0</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
