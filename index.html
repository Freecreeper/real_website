<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>The Button — Press If You Dare</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5K5XVK0J00"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5K5XVK0J00');
</script>
</head>

<body>
  <canvas id="particles"></canvas>

  <header class="topbar">
    <div class="brand">The Button</div>
    <div class="stats-mini">
      <span id="visitor-greeting">Welcome.</span>
      <a id="open-menu" class="pill" href="menu.html">Menu</a>
      <span id="version-display"></span>
    </div>
  </header>

  <main class="stage">
    <section class="center-card">
      <div class="glass card">

        <h1 id="gamer-tag-display">Welcome</h1>
        <p id="subtext">Press the button. See what happens.</p>

        <div class="button-wrap">
          <button id="the-button" class="giant">THE BUTTON</button>
          <div class="counter">Presses: <span id="count">0</span></div>
        </div>

        <div id="message-box">Be brave. Press the button.</div>

      </div>
    </section>
  </main>

  <div id="toast-area"></div>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <!-- onboarding -->
  <div id="onboard" class="modal">
    <div class="modal-card glass">
      <h2>Welcome</h2>

      <div class="onboard-choice" role="group" aria-label="Player type">
        <button id="onboard-new" class="pill primary" type="button" data-onboard-mode="new">New</button>
        <button id="onboard-returning" class="pill" type="button" data-onboard-mode="returning">Returning</button>
      </div>

      <p id="onboard-help" class="muted">Pick a name for the leaderboard.</p>

      <input id="gamer-tag" placeholder="Gamer Tag" maxlength="32" />

      <div id="returning-match" class="returning-match hidden">
        <p id="returning-match-copy" class="muted"></p>
        <div class="modal-actions">
          <button id="returning-retry" class="pill" type="button">Try Again</button>
          <button id="returning-confirm" class="pill primary" type="button">Yes, that's me</button>
        </div>
      </div>

      <label>
        <input id="humor-toggle" type="checkbox" />
        Enable Chaos Mode
      </label>

      <button id="accept-onboard" class="pill primary">
        Accept
      </button>
    </div>
  </div>

  

  <script src="version-egg.js"></script>
  <script src="script.js"></script>
</body>
</html>
