<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button — Press If You Dare</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="particles"></canvas>

  <header class="topbar">
    <div class="brand">The Button</div>
    <div class="stats-mini">
      <span id="visitor-greeting">Welcome.</span>
      <button id="open-menu" class="pill">Menu</button>
      <span id="version-display"></span>
    </div>
  </header>

  <main class="stage">
    <section class="center-card">
      <div class="glass card">

        <h1 id="gamer-tag-display">Welcome</h1>
        <p id="subtext">Press the button. See what happens.</p>

        <div class="button-wrap">
          <button id="the-button" class="giant">THE BUTTON</button>
          <div class="counter">Presses: <span id="count">0</span></div>
        </div>

        <div id="message-box">Be brave. Press the button.</div>

      </div>
    </section>
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  </main>

  <div id="toast-area"></div>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <!-- onboarding -->
  <div id="onboard" class="modal">
    <div class="modal-card glass">
      <h2>Welcome</h2>

      <input id="gamer-tag" placeholder="Gamer Tag" maxlength="32" />

      <label>
        <input id="humor-toggle" type="checkbox" />
        Enable Chaos Mode
      </label>

      <button id="accept-onboard" class="pill primary">
        Accept
      </button>
    </div>
  </div>

  

  <script src="version-egg.js"></script>
  <script src="script.js"></script>
</body>
</html>
