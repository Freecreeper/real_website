<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">
    <div class="hud">
      <div class="counter">Presses: <span id="count">0</span></div>
      <div id="achievements" class="achievements"></div>
    </div>

    <div class="center">
      <div class="button-wrap">
        <button id="big-button" class="big-button" aria-label="Press the Button" tabindex="0">PRESS</button>
        <div id="button-overlay" class="button-overlay hidden" aria-hidden="true"></div>
        <div id="messages" class="messages" aria-live="polite"></div>
      </div>
    </div>

    <div id="lore" class="lore"></div>

    <!-- Overlays / modals -->
    <div id="overlay" class="overlay hidden"></div>
    <div id="modal" class="modal hidden"></div>

    <!-- lightweight boss / events containers -->
    <canvas id="dvd-canvas" class="dvd hidden"></canvas>
    <div id="confetti" class="confetti hidden">🎉</div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
