<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button - Achievements</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="achievements-page">
  <canvas id="particles"></canvas>

  <header class="topbar">
    <a href="index.html" class="brand">The Button</a>
    <nav class="page-nav" aria-label="Main navigation">
      <a href="index.html">Button</a>
      <a href="menu.html">Menu</a>
      <a href="achievements.html" class="active" aria-current="page">Achievements</a>
      <span id="version-display"></span>
    </nav>
  </header>

  <main class="achievements-main">
    <header class="achievements-heading">
      <div>
        <p class="eyebrow">Player record</p>
        <h1>Achievements</h1>
        <p id="achievement-summary" class="muted">Loading your progress...</p>
      </div>
      <div class="achievement-total">
        <strong id="achievement-count">0 / 6</strong>
        <span>standard unlocked</span>
      </div>
    </header>

    <section class="achievement-section" aria-labelledby="standard-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Permanent progress</p>
          <h2 id="standard-title">Press milestones</h2>
        </div>
      </div>
      <div id="standard-achievements" class="achievement-list"></div>
    </section>

    <section class="achievement-section exclusive-section" aria-labelledby="world-first-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">One owner worldwide</p>
          <h2 id="world-first-title">World firsts</h2>
        </div>
        <span id="world-first-status" class="muted"></span>
      </div>
      <div id="world-first-achievements" class="achievement-list"></div>
    </section>
  </main>

  <div id="toast-area"></div>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <script src="version-egg.js"></script>
  <script src="api-client.js"></script>
  <script src="achievements.js"></script>
</body>
</html>
