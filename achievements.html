<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button - Achievements</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="achievements-page">
  <canvas id="particles"></canvas>

  <header class="topbar">
    <a href="index.html" class="brand">The Button</a>
    <div class="stats-mini">
      <a href="index.html" class="pill">Back</a>
      <a href="leaderboard.html" class="pill">Leaderboard</a>
      <span id="version-display"></span>
    </div>
  </header>

  <main class="achievements-main">
    <header class="achievements-heading">
      <p class="eyebrow">Your collection</p>
      <h1>Achievements</h1>
      <p id="achievement-summary" class="muted">Loading your progress...</p>
    </header>

    <section aria-labelledby="standard-title">
      <h2 id="standard-title">Press Milestones</h2>
      <div id="standard-achievements" class="achievement-grid"></div>
    </section>

    <section aria-labelledby="world-first-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">One winner per milestone</p>
          <h2 id="world-first-title">World Firsts</h2>
        </div>
        <span id="world-first-status" class="muted"></span>
      </div>
      <div id="world-first-achievements" class="achievement-grid exclusive-grid"></div>
    </section>
  </main>

  <div id="toast-area"></div>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <script src="achievements.js"></script>
</body>
</html>
