<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button - Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="collection-page">
  <canvas id="particles"></canvas>

  <header class="topbar">
    <a href="index.html" class="brand">The Button</a>
    <nav class="page-nav" aria-label="Main navigation">
      <a href="index.html">Button</a>
      <a href="menu.html">Menu</a>
      <a href="leaderboard.html" class="active" aria-current="page">Leaderboard</a>
      <span id="version-display"></span>
    </nav>
  </header>

  <main class="collection-main">
    <header class="collection-heading">
      <div>
        <p class="eyebrow">Top players</p>
        <h1>Leaderboard</h1>
        <p class="muted">Server-ranked button pressers.</p>
      </div>
    </header>

    <section class="glass leaderboard-card">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Presses</th>
            <th>Team</th>
            <th>Team Presses</th>
            <th>Title</th>
            <th>Achievements</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"><tr><td colspan="7">Loading leaderboard...</td></tr></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <script src="version-egg.js"></script>
  <script src="api-client.js"></script>
  <script src="page-effects.js"></script>
  <script>
  let hasRenderedLeaderboard = false;

  function leaderboardApiUrls(){
    const urls = ['/api/leaderboard'];
    if(location.hostname && location.port !== '5000' && location.protocol === 'http:'){
      urls.push(`${location.protocol}//${location.hostname}:5000/api/leaderboard`);
    }
    return [...new Set(urls)];
  }

  async function fetchLeaderboard(){
    let lastError = null;
    for(const url of leaderboardApiUrls()){
      try{
        const res = await fetch(url, {cache:'no-store'});
        const contentType = res.headers.get('content-type') || '';
        if(!res.ok){
          lastError = new Error(`Leaderboard returned ${res.status}`);
          continue;
        }
        if(!contentType.includes('application/json')){
          lastError = new Error('Leaderboard returned a non-JSON response');
          continue;
        }
        return res.json();
      }catch(error){
        lastError = error;
      }
    }
    throw lastError || new Error('Leaderboard unavailable');
  }

  function renderLeaderboard(players){
    const body = document.getElementById('leaderboard-body');
    if(!body) return;
    body.innerHTML = '';
    hasRenderedLeaderboard = true;

    if(!Array.isArray(players) || players.length === 0){
      body.innerHTML = '<tr><td colspan="7">No leaderboard entries yet.</td></tr>';
      return;
    }

    players.forEach((player,index)=>{
      const row = body.insertRow();
      [
        index + 1,
        player.name,
        Number(player.presses || 0).toLocaleString(),
        player.team ? player.team.toUpperCase() : '-',
        Number(player.divide_presses || 0).toLocaleString(),
        player.title || '-',
        player.achievements || 0
      ]
        .forEach(value => {
          const cell = row.insertCell();
          cell.textContent = value;
        });
    });
  }

  async function loadLeaderboard() {
    const body = document.getElementById('leaderboard-body');
    try {
      renderLeaderboard(await fetchLeaderboard());
    } catch(err) {
      if(body && !hasRenderedLeaderboard){
        body.innerHTML = '<tr><td colspan="7">Leaderboard is unavailable.</td></tr>';
      }
    }
  }

  if(window.setupVersionEgg) window.setupVersionEgg();
  loadLeaderboard();
  setInterval(loadLeaderboard,5000);
  </script>
</body>
</html>
