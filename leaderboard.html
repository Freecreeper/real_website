<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button - Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="collection-page">
  <canvas id="particles"></canvas>

  <header class="topbar">
    <a href="index.html" class="brand">The Button</a>
    <nav class="page-nav" aria-label="Main navigation">
      <a href="index.html">Button</a>
      <a href="menu.html">Menu</a>
      <a href="leaderboard.html" class="active" aria-current="page">Leaderboard</a>
      <span id="version-display"></span>
    </nav>
  </header>

  <main class="collection-main">
    <header class="collection-heading">
      <div>
        <p class="eyebrow">Top players</p>
        <h1>Leaderboard</h1>
        <p class="muted">Server-ranked button pressers.</p>
      </div>
    </header>

    <section class="glass leaderboard-card">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Presses</th>
            <th>Achievements</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <span class="creator-credit">Made by Zane</span>
  </footer>

  <script src="version-egg.js"></script>
  <script src="page-effects.js"></script>
  <script>
  async function loadLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard');
      const players = await res.json();
      const body = document.getElementById('leaderboard-body');
      body.innerHTML = '';

      players.forEach((player,index)=>{
        const row = body.insertRow();
        [index + 1, player.name, Number(player.presses || 0).toLocaleString(), player.achievements || 0]
          .forEach(value => {
            const cell = row.insertCell();
            cell.textContent = value;
          });
      });
    } catch(err) {
      const body = document.getElementById('leaderboard-body');
      if(body) body.innerHTML = '<tr><td colspan="4">Leaderboard is unavailable.</td></tr>';
    }
  }

  if(window.setupVersionEgg) window.setupVersionEgg();
  loadLeaderboard();
  setInterval(loadLeaderboard,5000);
  </script>
</body>
</html>
