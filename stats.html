<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Button — Stats</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">The Button — Stats</div>
      <div style="display:flex;gap:8px;align-items:center">
        <a href="index.html" class="pill">Home</a>
      </div>
    </header>

    <main style="padding:48px;max-width:980px;margin:0 auto;">
      <section class="glass" style="padding:22px;margin-bottom:18px;">
        <h2>Local Visitor Stats</h2>
        <p class="muted">Your stored data and session time.</p>
        <ul id="local-stats" style="margin-top:12px"></ul>
      </section>

      <section class="glass" style="padding:22px;">
        <h2>Worldwide Stats (local demo)</h2>
        <p class="muted">This demo stores global-ish numbers in your browser's localStorage.</p>
        <ul id="global-stats-page" style="margin-top:12px"></ul>
      </section>

      <section style="margin-top:18px;text-align:center">
        <div id="version-area" class="version" style="display:inline-block;cursor:pointer">v0.0.0</div>
      </section>
    </main>

    <script>
      function fmtTime(sec){ if(!sec) return '0s'; if(sec<60) return sec+'s'; const m=Math.floor(sec/60); const s=sec%60; if(m<60) return m+'m '+s+'s'; const h=Math.floor(m/60); const mm=m%60; return h+'h '+mm+'m'; }

      // read local state
      try{
        const raw = localStorage.getItem('thebutton:v1');
        const li = document.getElementById('local-stats');
        if(raw){ const s = JSON.parse(raw); li.innerHTML = `<li>Gamer Tag: ${s.gamerTag||'Traveler'}</li><li>Time spent: ${fmtTime(s.timeSpentSeconds||0)}</li><li>Presses (you): ${s.presses||0}</li><li>Achievements: ${(s.achievements||[]).length}</li><li>Lore discovered: ${(s.loreSeen||[]).length}</li>`; } else { li.innerHTML='<li>No local data yet.</li>' }
      }catch(e){console.warn(e)}

      // global-ish
      try{
        const k='thebutton:global'; const g = JSON.parse(localStorage.getItem(k)) || {visitors:0,presses:0,goose:0,potato:0,pranks:0};
        const el = document.getElementById('global-stats-page'); el.innerHTML = `<li>Total Visitors: ${g.visitors||0}</li><li>Worldwide Presses: ${g.presses||0}</li><li>Gooses Released: ${g.goose||0}</li><li>Potatoes Detected: ${g.potato||0}</li><li>Pranks Triggered: ${g.pranks||0}</li>`;
      }catch(e){console.warn(e)}

      // version
      fetch('version.json').then(r=>r.json()).then(v=>{ const a=document.getElementById('version-area'); a.textContent='v'+(v.version||'0.0.0'); a.addEventListener('click', ()=>alert(`Version ${v.version}\nBuild: ${v.build}\n${v.notes||''}`)); }).catch(()=>{});
    </script>
  </body>
</html>
