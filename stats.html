<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button — Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">Global Stats</div>
    <a href="index.html" class="pill">Back</a>
  </header>

  <main style="padding:40px;max-width:900px;margin:auto;">

    <section class="glass" style="padding:20px;">
      <h2>Live Global Stats 🌍</h2>

      <ul>
        <li>Total Visitors: <span id="world-visitors">0</span></li>
        <li>Total Presses: <span id="world-presses">0</span></li>
        <li>Gooses Released: <span id="world-goose">0</span></li>
        <li>Potatoes Detected: <span id="world-potato">0</span></li>
        <li>Pranks Triggered: <span id="world-pranks">0</span></li>
      </ul>
    </section>

  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const socket = io("http://3.90.63.167:5000");

    socket.on("stats_update", (data) => {
      document.getElementById("world-visitors").textContent = data.visitors;
      document.getElementById("world-presses").textContent = data.presses;
      document.getElementById("world-goose").textContent = data.goose;
      document.getElementById("world-potato").textContent = data.potato;
      document.getElementById("world-pranks").textContent = data.pranks;
    });
  </script>
</body>
</html>
