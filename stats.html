<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Button — Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">Global Stats</div>
    <a href="index.html" class="pill">Back</a>
  </header>

  <main style="padding:40px;max-width:900px;margin:auto;">

    <section class="glass" style="padding:20px;">
      <h2>Live Global Stats 🌍</h2>

      <ul>
        <li>Total Visitors: <span id="g_total_visitors">0</span></li>
        <li>Total Presses: <span id="g_total_presses">0</span></li>
        <li>Gooses Released: <span id="g_total_goose">0</span></li>
        <li>Potatoes Detected: <span id="g_total_potato">0</span></li>
        <li>Pranks Triggered: <span id="g_total_pranks">0</span></li>
      </ul>
    </section>

  </main>

<script>
const API_BASE = '';

async function fetchStats() {
  try {
    const res = await fetch(API_BASE + '/api/stats');
    const data = await res.json();

    document.getElementById("g_total_visitors").textContent =
      data.total_visitors || 0;

    document.getElementById("g_total_presses").textContent =
      data.total_presses || 0;

    document.getElementById("g_total_goose").textContent =
      data.gooses_released || 0;

    document.getElementById("g_total_potato").textContent =
      data.potatoes_detected || 0;

    document.getElementById("g_total_pranks").textContent =
      (data.gooses_released || 0) +
      (data.potatoes_detected || 0) +
      (data.alien_contacts || 0) +
      (data.rickroll_victims || 0);

  } catch (e) {
    console.error("Stats fetch failed:", e);
  }
}

fetchStats();
setInterval(fetchStats, 5000);
</script>
</body>
</html>
